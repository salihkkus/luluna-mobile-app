name: luluna
description: "Otizmli çocuklar için AI destekli sosyal iletişim asistanı."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Canlı görüntü akışı ve nesne tespiti hazırlığı için
  camera: ^0.10.5+5
  # Tespit edilen nesneleri seslendirmek için
  flutter_tts: ^3.8.3
  # Modern ve minimalist tipografi için
  google_fonts: ^6.1.0
  # Kamera ve mikrofon izinlerini yönetmek için
  permission_handler: ^11.0.1
  # Uygulama içi ikonlar için
  cupertino_icons: ^1.0.2
  # Wildcard önerisi: Sakinleştirici animasyonlar eklemek isterseniz kullanışlıdır
  lottie: ^3.1.0
  # AI Model için alternatif paketler
  # tflite_flutter namespace sorunu nedeniyle geçici olarak kaldırıldı
  # Doğu'nun modeli gelince tekrar eklenecek
  # Görüntü işleme için
  image: ^4.0.17
  # Path operations
  path: ^1.8.3
  # SQLite veritabanı için
  sqflite: ^2.3.0
  # Veritabanı dosyasının yolunu almak için
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # AI Model ve Label dosyaları
  assets:
    - assets/models/
  # Gelecekte logo veya özel ikonlar eklemek isterseniz assets klasörünü buradan aktif edebilirsiniz.
  # assets:
  #   - assets/images/