<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden">
<!-- Splash Canvas -->
<div class="relative w-full h-screen flex flex-col justify-between items-center bg-gradient-to-b from-[#F8F9FA] to-[#ABC4FF] overflow-hidden">
<!-- Abstract Blurry Shapes -->
<div class="absolute -top-20 -left-20 w-64 h-64 bg-mint-accent/40 rounded-full blur-[80px]"></div>
<div class="absolute top-1/4 -right-10 w-48 h-48 bg-pink-accent/40 rounded-full blur-[60px]"></div>
<div class="absolute bottom-1/3 left-1/4 w-32 h-32 bg-primary-container/30 rounded-full blur-[50px]"></div>
<!-- Star/Moon Particles -->
<div class="absolute inset-0 pointer-events-none opacity-40">
<span class="material-symbols-outlined absolute text-[12px] top-[10%] left-[15%] text-on-surface-variant">colors_spark</span>
<span class="material-symbols-outlined absolute text-[8px] top-[25%] left-[80%] text-on-surface-variant">star</span>
<span class="material-symbols-outlined absolute text-[10px] top-[60%] left-[10%] text-on-surface-variant">star</span>
<span class="material-symbols-outlined absolute text-[14px] top-[80%] left-[70%] text-on-surface-variant">auto_awesome</span>
<span class="material-symbols-outlined absolute text-[12px] top-[40%] left-[50%] text-on-surface-variant">circle</span>
</div>
<!-- Center Content -->
<div class="flex-1 flex flex-col items-center justify-center z-10 px-container-margin">
<!-- Logo Section -->
<div class="relative mb-xl flex items-center justify-center">
<!-- Background breathing glow effect -->
<div class="absolute w-40 h-40 breathing-glow rounded-full"></div>
<!-- Glassmorphism Container for Logo -->
<div class="w-48 h-48 glass-panel rounded-full flex items-center justify-center p-md border border-white/40 shadow-xl overflow-hidden">
<img alt="Luluna Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uhlgNrpkyYfialOPGo-EE92RAc0TAkJqv13TnuwHBPonVF9CzjkgwptVKnyRuoXPRGYp9FlFbgt2CWZcdvPlIM1p-JGtugJrVtgQoUcWjXsYReXrFj6wsnwyDBJ1vOXZ0csvTqVx59ln-8RjmDT8KdtrKzNPzu9fHbzndu8ihQTASf2k2iXmtfv4olwVAuYlQQOQWts1HMN0tgxNjBU6dD_OxqM9Agb1XEHMkZj-f1CgLm7lNUSjSlBzg"/>
</div>
</div>
<!-- Brand Identity -->
<div class="text-center">
<h1 class="font-poppins text-[48px] leading-tight text-on-surface font-bold tracking-tight">
                    Luluna
                </h1>
<p class="font-body-lg text-on-surface-variant mt-sm tracking-wide">
                    Hadi keşfedelim
                </p>
</div>
</div>
<!-- Bottom Section: CTA -->
<div class="w-full px-container-margin pb-xl z-20">
<button class="w-full bg-gradient-to-r from-primary to-primary-container h-[64px] rounded-lg shadow-lg shadow-primary/20 flex items-center justify-between px-xl active:scale-95 transition-all duration-200">
<span class="text-on-primary font-headline-sm tracking-wide">Başlayalım</span>
<span class="material-symbols-outlined text-on-primary text-[28px]">arrow_forward</span>
</button>
<!-- Soft spacing at the very bottom -->
<div class="h-md"></div>
</div>
