<body class="flex items-center justify-center min-h-screen p-4 overflow-x-hidden">
<!-- Device Container (iPhone 15 Pro Ratio Emulation) -->
<main class="relative w-full max-w-[430px] min-h-[932px] bg-background shadow-2xl rounded-[3rem] overflow-hidden flex flex-col border-[8px] border-surface-container-highest">
<!-- Background Decorative Shapes -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="absolute top-[40%] -left-10 w-48 h-48 bg-tertiary-container/15 rounded-full blur-3xl"></div>
<div class="absolute bottom-10 right-0 w-80 h-80 bg-secondary-container/20 rounded-full blur-3xl"></div>
</div>
<!-- Top Navigation -->
<header class="relative z-10 px-container-margin pt-xl flex items-center justify-between">
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center rounded-full bg-surface-container-lowest custom-shadow active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<div class="h-1 w-12 bg-outline-variant/30 rounded-full"></div>
<div class="w-touch-target-min h-touch-target-min"></div>
</header>
<!-- Hero Illustration & Title -->
<section class="relative z-10 px-container-margin pt-md flex flex-col items-center text-center">
<div class="w-40 h-40 mb-md relative">

</div>

<p class="font-body-md text-body-md text-on-surface-variant px-md">Luluna deneyimini kişiselleştirelim</p>
</section>
<!-- Profile Form Content -->
<section class="relative z-10 flex-1 px-container-margin py-xl space-y-lg overflow-y-auto pb-[140px]">

<div class="flex justify-center mb-xl">
<div class="relative">
<div class="w-32 h-32 rounded-full bg-primary-container/30 border-4 border-surface-container-lowest flex items-center justify-center overflow-hidden custom-shadow">
<span class="material-symbols-outlined text-[48px] text-primary/40">person</span>
<img alt="Profile" class="absolute inset-0 w-full h-full object-cover opacity-0" data-alt="A circular placeholder for a child's profile picture, featuring a soft, minimalist icon of a smiling face. The surrounding area is decorated with gentle pastel circles in light blue and soft peach, maintaining a clean and premium aesthetic. The background is a soft off-white surface with extremely subtle depth." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCLuNH0qlRRpyZH4m3dge5AnUf3UixvQrp9Zjfxmq60cZaNj1FnG-wVz6K0LQBjlnTPXtgk_Vg6hXXMWlN6TgZrsA9KkqmS36O_vBGkyzCvtO1_VYC8-IfgmdqqwcKSTb6-TfWghoLUzESnxzSG-puJ3rZc5kIXC5159txHEtxvplZEONNpmsXQzaULZRaIny57B_FVcwwcgSuj3Eq3ZVqYi0zdM2u7IuHZheuxo8u-zdgwyXhEwLT9n8bZFgLLQG19kzPH1W75t84"/>

<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
</div>
</div>
<!-- Child Name Input -->
<div class="bg-surface-container-lowest p-md rounded-lg custom-shadow">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-sm ml-xs">Çocuğunuzun İsmi</label>
<input class="w-full h-[64px] px-lg rounded-full border-2 border-surface-variant bg-surface-container-low text-on-surface font-body-lg focus:border-primary focus:ring-0 transition-colors" placeholder="İsim giriniz" type="text"/>
</div>

<div class="flex flex-wrap gap-sm">
<button class="px-lg h-touch-target-min rounded-full border-2 border-primary bg-primary text-on-primary font-label-lg transition-all">3-4</button>
<button class="px-lg h-touch-target-min rounded-full border-2 border-surface-variant text-on-surface-variant font-label-lg hover:border-primary/50 transition-all">5-6</button>
<button class="px-lg h-touch-target-min rounded-full border-2 border-surface-variant text-on-surface-variant font-label-lg hover:border-primary/50 transition-all">7-8</button>
<button class="px-lg h-touch-target-min rounded-full border-2 border-surface-variant text-on-surface-variant font-label-lg hover:border-primary/50 transition-all">9+</button>
</div>
</div>
<!-- Communication Preference -->
<div class="bg-surface-container-lowest p-md rounded-lg custom-shadow">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-sm ml-xs">İletişim Tercihi</label>

<option>Görsel Destekli</option>
<option>İşaret Dili / Jestler</option>

<div class="flex flex-wrap gap-sm">
<button class="px-md py-sm rounded-full bg-secondary-container text-on-secondary-container border border-outline-variant/30 font-label-md flex items-center gap-xs active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[18px]">contrast</span> High Contrast

<button class="px-md py-sm rounded-full bg-surface-container-low text-on-surface-variant border border-outline-variant/30 font-label-md flex items-center gap-xs active:scale-95 transition-transform">

<button class="px-md py-sm rounded-full bg-surface-container-low text-on-surface-variant border border-outline-variant/30 font-label-md flex items-center gap-xs active:scale-95 transition-transform">

<button class="px-md py-sm rounded-full bg-surface-container-low text-on-surface-variant border border-outline-variant/30 font-label-md flex items-center gap-xs active:scale-95 transition-transform">

<div class="flex justify-between mt-sm px-xs">
<span class="text-[10px] font-label-md text-outline">Sakin</span>
<span class="text-[10px] font-label-md text-outline">Dengeli</span>
<span class="text-[10px] font-label-md text-outline">Aktif</span>
</div>
</div>
</div>

<div class="flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">record_voice_over</span>
</div>
<span class="font-body-md text-on-surface">Sesli Rehberlik</span>
</div>
<div class="w-12 h-6 bg-primary rounded-full relative flex items-center p-1 cursor-pointer">
<div class="w-4 h-4 bg-white rounded-full ml-auto"></div>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-md">

</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-tertiary-container/20 flex items-center justify-center">

</div>

<div class="w-12 h-6 bg-outline-variant/30 rounded-full relative flex items-center p-1 cursor-pointer">

<button class="w-full h-[64px] bg-primary text-on-primary rounded-full font-headline-sm flex items-center justify-center gap-md custom-shadow active:scale-[0.98] transition-all">
                Devam Et

</button>
<div class="h-6 w-full flex justify-center items-end pb-1">
<div class="w-32 h-1.5 bg-on-surface/10 rounded-full"></div>
</div>
