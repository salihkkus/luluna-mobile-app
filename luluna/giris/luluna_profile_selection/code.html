        }
        @keyframes float {

<!-- Top App Bar (Suppressed Shell as per instructions - Task Focused Screen) -->
<header class="w-full z-50 flex justify-between items-center px-container-margin h-touch-target-min bg-surface/80 backdrop-blur-md">
<div class="flex items-center gap-sm">

<span class="font-headline-sm text-headline-sm text-primary">EduScan AI</span>
</div>
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">

</button>
</header>
<main class="flex-1 relative flex flex-col items-center justify-center px-container-margin pb-xl">

<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="floating-shape absolute top-20 -left-10 w-40 h-40 bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="floating-shape absolute bottom-40 -right-20 w-60 h-60 bg-secondary-container/30 rounded-full blur-3xl" style="animation-delay: 2s;"></div>
<div class="floating-shape absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-tertiary-container/10 rounded-full blur-[100px]"></div>
</div>
<!-- Header Section -->
<div class="relative z-10 text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-on-background mb-sm">Kim giriş yapıyor?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Size uygun deneyimi hazırlayalım</p>
</div>
<!-- Selection Cards Container -->
<div class="relative z-10 w-full max-w-[400px] flex flex-col gap-lg">
<!-- Card 1: Parent Entry -->
<button class="group w-full p-lg rounded-lg bg-gradient-to-br from-primary-container/40 to-white flex items-center gap-md text-left soft-shadow border border-outline-variant/30 hover:scale-[0.98] transition-all active:scale-95">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center text-3xl shadow-sm">
                    👨‍👩‍👧
                </div>
<div class="flex-1">
<div class="flex items-center gap-xs">
<h3 class="font-headline-sm text-headline-sm text-on-primary-container">Veli Girişi</h3>
<span class="material-symbols-outlined text-primary text-body-md" data-icon="lock">lock</span>
</div>
<p class="font-body-md text-body-md text-on-primary-container/80">Ayarlar ve gelişim raporları</p>
</div>
<span class="material-symbols-outlined text-primary-container group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Card 2: Child Mode -->
<button class="group w-full p-lg rounded-lg bg-gradient-to-br from-secondary-container/40 to-white flex items-center gap-md text-left soft-shadow border border-outline-variant/30 hover:scale-[0.98] transition-all active:scale-95">
<div class="relative">
<div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center text-3xl shadow-sm">
                        🧒
                    </div>
<!-- Small decorative pulse -->
<div class="absolute inset-0 rounded-full bg-secondary-container animate-ping opacity-20"></div>
</div>
<div class="flex-1">
<h3 class="font-headline-sm text-headline-sm text-on-secondary-container">Çocuk Modu</h3>

</div>
<span class="material-symbols-outlined text-secondary-container group-hover:translate-x-1 transition-transform" data-icon="rocket_launch">rocket_launch</span>
