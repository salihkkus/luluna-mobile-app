<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#c4c6d0",
                    "on-secondary": "#ffffff",
                    "tertiary": "#79590a",
                    "surface-container-highest": "#e3e2e7",
                    "on-primary-container": "#375084",
                    "surface-dim": "#dad9de",
                    "surface-container": "#efedf2",
                    "secondary-fixed": "#c6e9ee",
                    "on-tertiary-fixed": "#261900",
                    "primary-fixed-dim": "#aec6ff",
                    "primary-fixed": "#d8e2ff",
                    "inverse-on-surface": "#f1f0f5",
                    "on-tertiary-fixed-variant": "#5d4200",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#e9e7ec",
                    "surface": "#faf8fe",
                    "on-primary-fixed": "#001a43",
                    "error": "#ba1a1a",
                    "on-background": "#1a1b1f",
                    "surface-variant": "#e3e2e7",
                    "inverse-primary": "#aec6ff",
                    "outline": "#747780",
                    "secondary": "#436468",
                    "surface-tint": "#455e92",
                    "surface-container-low": "#f4f3f8",
                    "inverse-surface": "#2f3034",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#c3e6eb",
                    "tertiary-fixed-dim": "#ecc06b",
                    "on-surface": "#1a1b1f",
                    "on-secondary-container": "#47686c",
                    "primary": "#455e92",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed-variant": "#2c4678",
                    "on-error": "#ffffff",
                    "tertiary-fixed": "#ffdea3",
                    "surface-bright": "#faf8fe",
                    "on-surface-variant": "#44474f",
                    "on-primary": "#ffffff",
                    "tertiary-container": "#e9be69",
                    "on-secondary-fixed-variant": "#2b4c50",
                    "primary-container": "#abc4ff",
                    "error-container": "#ffdad6",
                    "secondary-fixed-dim": "#aacdd2",
                    "background": "#faf8fe",
                    "on-secondary-fixed": "#001f23",
                    "on-tertiary-container": "#694c00"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "touch-target-min": "48px",
                    "xs": "4px",
                    "unit": "4px",
                    "md": "16px",
                    "xl": "32px",
                    "sm": "8px",
                    "lg": "24px",
                    "container-margin": "20px"
            },
            "fontFamily": {
                    "label-md": ["Lexend"],
                    "label-lg": ["Lexend"],
                    "headline-sm": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "body-lg": ["Lexend"],
                    "body-md": ["Lexend"]
            },
            "fontSize": {
                    "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-gradient-bg {
            background: radial-gradient(circle at top left, #abc4ff44 0%, transparent 40%),
                        radial-gradient(circle at bottom right, #bee1e644 0%, transparent 40%),
                        #faf8fe;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(233, 236, 239, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden soft-gradient-bg">
<!-- Top AppBar (from JSON guidance but suppressed for focus) -->
<header class="flex justify-between items-center px-container-margin h-touch-target-min w-full z-50 fixed top-0">
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-container-margin py-xl relative">
<!-- Floating Abstract Shapes -->
<div class="absolute top-20 left-10 w-16 h-16 bg-primary-container/20 rounded-full blur-xl"></div>
<div class="absolute bottom-40 right-5 w-24 h-24 bg-secondary-container/30 rounded-full blur-2xl"></div>
<!-- Header Section -->
<div class="flex flex-col items-center text-center mb-xl">
<div class="w-20 h-20 bg-primary-container text-primary rounded-full flex items-center justify-center shadow-lg shadow-primary/10 mb-lg relative">
<div class="absolute inset-0 bg-primary-container rounded-full animate-pulse opacity-40"></div>
<span class="material-symbols-outlined text-[32px] relative z-10" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<h1 class="text-headline-md font-headline-md text-on-surface mb-xs">Veli Doğrulaması</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Devam etmek için PIN girin</p>
</div>
<!-- PIN Indicators -->
<div class="flex gap-lg mb-xl h-md items-center">
<div class="w-4 h-4 rounded-full bg-primary shadow-sm shadow-primary/20 scale-110"></div>
<div class="w-4 h-4 rounded-full bg-outline-variant/40"></div>
<div class="w-4 h-4 rounded-full bg-outline-variant/40"></div>
<div class="w-4 h-4 rounded-full bg-outline-variant/40"></div>
</div>
<!-- Numpad Section -->
<div class="grid grid-cols-3 gap-md w-full max-w-[320px]">
<!-- Row 1 -->
<button class="h-16 rounded-lg glass-card flex items-center justify-center text-headline-sm font-headline-sm text-on-surface active:scale-95 transition-transform duration-200 shadow-sm">1</button>
<button class="h-16 rounded-lg glass-card flex items-center justify-center text-headline-sm font-headline-sm text-on-surface active:scale-95 transition-transform duration-200 shadow-sm">2</button>
<button class="h-16 rounded-lg glass-card flex items-center justify-center text-headline-sm font-headline-sm text-on-surface active:scale-95 transition-transform duration-200 shadow-sm">3</button>
<!-- Row 2 -->
<button class="h-16 rounded-lg glass-card flex items-center justify-center text-headline-sm font-headline-sm text-on-surface active:scale-95 transition-transform duration-200 shadow-sm">4</button>
<button class="h-16 rounded-lg glass-card flex items-center justify-center text-headline-sm font-headline-sm text-on-surface active:scale-95 transition-transform duration-200 shadow-sm">5</button>
<button class="h-16 rounded-lg glass-card flex items-center justify-center text-headline-sm font-headline-sm text-on-surface active:scale-95 transition-transform duration-200 shadow-sm">6</button>
<!-- Row 3 -->
<button class="h-16 rounded-lg glass-card flex items-center justify-center text-headline-sm font-headline-sm text-on-surface active:scale-95 transition-transform duration-200 shadow-sm">7</button>
<button class="h-16 rounded-lg glass-card flex items-center justify-center text-headline-sm font-headline-sm text-on-surface active:scale-95 transition-transform duration-200 shadow-sm">8</button>
<button class="h-16 rounded-lg glass-card flex items-center justify-center text-headline-sm font-headline-sm text-on-surface active:scale-95 transition-transform duration-200 shadow-sm">9</button>
<!-- Row 4 -->
<button class="h-16 rounded-lg flex items-center justify-center text-primary active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[28px]" data-icon="fingerprint">fingerprint</span>
</button>
<button class="h-16 rounded-lg glass-card flex items-center justify-center text-headline-sm font-headline-sm text-on-surface active:scale-95 transition-transform duration-200 shadow-sm">0</button>
<button class="h-16 rounded-lg flex items-center justify-center text-on-surface-variant active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[28px]" data-icon="backspace">backspace</span>
</button>
</div>
<!-- Extra Options -->
<div class="mt-xl flex flex-col items-center gap-md">
<button class="text-label-lg font-label-lg text-primary py-xs px-md rounded-full hover:bg-primary-container transition-colors">
                Şifremi Unuttum
            </button>
</div>
</main>
<!-- Bottom Footer (Guaranteed access message) -->
<footer class="w-full flex justify-center pb-xl">
<div class="flex items-center gap-xs px-md py-sm bg-surface-container-low rounded-full border border-outline-variant/30">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant" data-icon="verified_user">verified_user</span>
<span class="text-label-md font-label-md text-on-surface-variant">Güvenli ebeveyn erişimi</span>
</div>
</footer>
<!-- Background Elements -->
<div class="fixed inset-0 pointer-events-none -z-10 opacity-30 overflow-hidden">
<div class="absolute top-[10%] left-[80%] transform rotate-45">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="absolute bottom-[20%] left-[10%] transform -rotate-12">
<span class="material-symbols-outlined text-[64px] text-secondary" data-icon="brightness_2" data-weight="fill" style="font-variation-settings: 'FILL' 1;">brightness_2</span>
</div>
<div class="absolute top-[50%] left-[5%] opacity-20">
<span class="material-symbols-outlined text-[32px] text-primary" data-icon="cloud" data-weight="fill" style="font-variation-settings: 'FILL' 1;">cloud</span>
</div>
<div class="absolute bottom-[5%] right-[15%]">
<span class="material-symbols-outlined text-[40px] text-secondary" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
</body></html>
